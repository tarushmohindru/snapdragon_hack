services:
  ml:
    build:
      context: ./ml
    environment:
      FORMFUSION_ML_ENVIRONMENT: ${FORMFUSION_ML_ENVIRONMENT:-development}
      FORMFUSION_ML_SERVICE_KEY: ${FORMFUSION_ML_SERVICE_KEY:-local-ml-service-key-change-before-production}
      FORMFUSION_ML_GOOGLE_API_KEY: ${FORMFUSION_ML_GOOGLE_API_KEY:-}
      FORMFUSION_ML_GOOGLE_MODEL: ${FORMFUSION_ML_GOOGLE_MODEL:-gemma-3-27b-it}
      FORMFUSION_ML_SARVAM_API_KEY: ${FORMFUSION_ML_SARVAM_API_KEY:-}
      FORMFUSION_ML_SARVAM_MODEL: ${FORMFUSION_ML_SARVAM_MODEL:-sarvam-m}
      FORMFUSION_ML_ALLOW_APPROXIMATE_CALIBRATION: ${FORMFUSION_ML_ALLOW_APPROXIMATE_CALIBRATION:-true}
      FORMFUSION_ML_APPROXIMATE_CAMERA_BASELINE_CM: ${FORMFUSION_ML_APPROXIMATE_CAMERA_BASELINE_CM:-30}
    volumes:
      - ml_data:/data
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./web-backend
    environment:
      FORMFUSION_ENVIRONMENT: ${FORMFUSION_ENVIRONMENT:-development}
      FORMFUSION_ALLOWED_ORIGINS: '["http://localhost:3000"]'
      FORMFUSION_ML_SERVICE_URL: http://ml:8100
      FORMFUSION_ML_SERVICE_KEY: ${FORMFUSION_ML_SERVICE_KEY:-local-ml-service-key-change-before-production}
      FORMFUSION_JOIN_CODE_SECRET: ${FORMFUSION_JOIN_CODE_SECRET:-local-join-code-secret-change-before-production}
      FORMFUSION_DATABASE_PATH: /data/formfusion.sqlite3
      FORMFUSION_ML_CALIBRATION_TIMEOUT_SECONDS: 180
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    depends_on:
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./web-frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ml_data:
  backend_data:
